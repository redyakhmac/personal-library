<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | کتابخانه من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-width: 250px;
        }
        .auth-image i {
            font-size: 4rem;
        }
        .auth-image h2 {
            font-size: 1.8rem;
            margin: 16px 0;
        }
        .auth-form {
            flex: 1;
            padding: 48px;
            min-width: 300px;
        }
        .auth-tabs {
            display: flex;
            gap: 20px;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 32px;
        }
        .auth-tab {
            background: none;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #6c757d;
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        .auth-form-content {
            display: none;
        }
        .auth-form-content.active {
            display: block;
        }
        .demo-info {
            margin-top: 24px;
            padding: 12px;
            background: #f0f3ff;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .auth-image { display: none; }
            .auth-form { padding: 32px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-image">
            <div>
                <i class="fas fa-book-open"></i>
                <h2>کتابخانه شخصی</h2>
                <p>مدیریت کتاب‌های خود را شروع کنید</p>
            </div>
        </div>
        <div class="auth-form">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">ورود</button>
                <button class="auth-tab" data-tab="register">ثبت‌نام</button>
            </div>
            
            <div id="login-form" class="auth-form-content active">
                <h3>ورود به حساب</h3>
                <div class="mb-3">
                    <label>شماره موبایل یا ایمیل</label>
                    <input type="text" id="login-identifier" class="form-control" placeholder="09123456789 یا admin@library.com">
                </div>
                <div class="mb-3">
                    <label>رمز عبور</label>
                    <input type="password" id="login-password" class="form-control" placeholder="********">
                </div>
                <button id="login-btn" class="btn btn-primary w-100">ورود</button>
                <div class="demo-info">
                    <i class="fas fa-info-circle"></i> حساب تست: admin@library.com | رمز: admin
                </div>
            </div>
            
            <div id="register-form" class="auth-form-content">
                <h3>ثبت‌نام جدید</h3>
                <div class="mb-3">
                    <label>نام کامل</label>
                    <input type="text" id="register-name" class="form-control" placeholder="علی رضایی">
                </div>
                <div class="mb-3">
                    <label>شماره موبایل</label>
                    <input type="tel" id="register-phone" class="form-control" placeholder="09123456789">
                </div>
                <div class="mb-3">
                    <label>ایمیل (اختیاری)</label>
                    <input type="email" id="register-email" class="form-control" placeholder="example@email.com">
                </div>
                <div class="mb-3">
                    <label>رمز عبور</label>
                    <input type="password" id="register-password" class="form-control" placeholder="********">
                </div>
                <button id="register-btn" class="btn btn-success w-100">ثبت‌نام</button>
            </div>
        </div>
    </div>

    <script>
        // مدیریت تب‌ها
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form-content');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                forms.forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${target}-form`).classList.add('active');
            });
        });
        
        // ثبت‌نام
        document.getElementById('register-btn')?.addEventListener('click', async () => {
            const full_name = document.getElementById('register-name').value;
            let phone = document.getElementById('register-phone').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            if (!full_name) { alert('نام کامل را وارد کنید'); return; }
            if (!phone) { alert('شماره موبایل را وارد کنید'); return; }
            if (!password || password.length < 4) { alert('رمز عبور حداقل ۴ کاراکتر'); return; }
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, phone, email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = data.redirect;
            } else {
                alert(data.message);
            }
        });
        
        // ورود
        document.getElementById('login-btn')?.addEventListener('click', async () => {
            const identifier = document.getElementById('login-identifier').value;
            const password = document.getElementById('login-password').value;
            
            if (!identifier || !password) {
                alert('نام کاربری و رمز عبور را وارد کنید');
                return;
            }
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = data.redirect;
            } else {
                alert(data.message || 'نام کاربری یا رمز عبور اشتباه است');
            }
        });
    </script>
</body>
</html>
