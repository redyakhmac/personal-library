<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات | کتابخانه من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .settings-form {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-section {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e9ecef;
        }
        .form-section:last-child {
            border-bottom: none;
        }
        .form-section h4 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            border-radius: 12px;
            border: 1px solid #e9ecef;
            padding: 10px 16px;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }
        .alert-message {
            display: none;
            margin-bottom: 20px;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .alert-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar-island">
            <div class="sidebar-header">
                <div class="user-avatar">
                    <img src="assets/images/default-avatar.png" alt="avatar" id="user-avatar">
                </div>
                <div class="user-info">
                    <h4 id="user-name">کاربر</h4>
                    <span id="user-phone"></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>داشبورد</span>
                </a>
                <a href="/books" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>کتاب‌ها</span>
                </a>
                <a href="/users" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>کاربران</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>آمار</span>
                </a>
                <a href="/settings" class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>تنظیمات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/api/logout" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>خروج</span>
                </a>
            </div>
        </aside>

        <main class="main-island">
            <header class="header-island">
                <div class="header-left">
                    <h2>تنظیمات حساب</h2>
                </div>
                <div class="header-right">
                    <div class="app-info">
                        <i class="fas fa-info-circle"></i>
                        <span>کتابخانه شخصی v1.0</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="settings-form">
                    <div id="alert-message" class="alert-message"></div>

                    <div class="form-section">
                        <h4><i class="fas fa-user"></i> اطلاعات شخصی</h4>
                        <div class="form-group">
                            <label>نام کامل</label>
                            <input type="text" id="full-name" class="form-control" placeholder="نام خود را وارد کنید">
                        </div>
                        <div class="form-group">
                            <label>شماره موبایل</label>
                            <input type="tel" id="phone" class="form-control" disabled>
                            <small class="text-muted">شماره موبایل قابل تغییر نیست</small>
                        </div>
                        <div class="form-group">
                            <label>ایمیل</label>
                            <input type="email" id="email" class="form-control" placeholder="example@email.com">
                        </div>
                    </div>

                    <div class="form-section">
                        <h4><i class="fas fa-lock"></i> امنیت</h4>
                        <button class="btn btn-outline-secondary" onclick="showChangePasswordModal()">
                            <i class="fas fa-key"></i> تغییر رمز عبور
                        </button>
                    </div>

                    <button class="btn btn-save" onclick="saveSettings()">
                        <i class="fas fa-save"></i> ذخیره تنظیمات
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        async function loadSettings() {
            const res = await fetch('/api/current-user');
            const data = await res.json();
            if (data.success) {
                document.getElementById('full-name').value = data.user.full_name || '';
                document.getElementById('phone').value = data.user.phone || '';
                document.getElementById('email').value = data.user.email || '';
            }
        }

        async function saveSettings() {
            const full_name = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;

            const res = await fetch('/api/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email })
            });

            const data = await res.json();
            const alertEl = document.getElementById('alert-message');
            
            if (data.success) {
                alertEl.className = 'alert-message alert-success show';
                alertEl.innerHTML = '<i class="fas fa-check-circle"></i> تنظیمات با موفقیت ذخیره شد';
                setTimeout(() => alertEl.classList.remove('show'), 3000);
            } else {
                alertEl.className = 'alert-message alert-danger show';
                alertEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> خطا در ذخیره تنظیمات';
                setTimeout(() => alertEl.classList.remove('show'), 3000);
            }
        }

        function showChangePasswordModal() {
            alert('تغییر رمز عبور - قابلیتی که به زودی اضافه خواهد شد');
        }

        loadSettings();
        loadUserInfo();
    </script>
</body>
</html>
