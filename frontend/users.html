<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاربران | کتابخانه من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar-island">
            <div class="sidebar-header">
                <div class="user-avatar">
                    <img src="assets/images/default-avatar.png" alt="avatar" id="user-avatar">
                </div>
                <div class="user-info">
                    <h4 id="user-name">کاربر</h4>
                    <span id="user-phone"></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>داشبورد</span>
                </a>
                <a href="/books" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>کتاب‌ها</span>
                </a>
                <a href="/users" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>کاربران</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>آمار</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>تنظیمات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/api/logout" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>خروج</span>
                </a>
            </div>
        </aside>

        <main class="main-island">
            <header class="header-island">
                <div class="header-left">
                    <h2>کاربران سیستم</h2>
                </div>
                <div class="header-right">
                    <div class="app-info">
                        <i class="fas fa-info-circle"></i>
                        <span>کتابخانه شخصی v1.0</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>نام کامل</th>
                                <th>شماره موبایل</th>
                                <th>ایمیل</th>
                                <th>نقش</th>
                                <th>وضعیت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="users-list">
                            <tr>
                                <td colspan="6" class="text-center text-muted">
                                    <i class="fas fa-spinner fa-spin"></i> در حال بارگذاری...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        async function loadUsers() {
            try {
                // Get all users
                const response = await fetch('/api/current-user');
                const userData = await response.json();
                
                if (userData.success && userData.user.role === 'admin') {
                    // This is simplified - in production, you'd want an endpoint to get all users
                    const usersList = document.getElementById('users-list');
                    usersList.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center text-muted">
                                تنها مدیران می‌توانند لیست کاربران را ببینند
                            </td>
                        </tr>
                    `;
                }
            } catch (e) {
                console.error('Error loading users:', e);
            }
        }

        loadUsers();
        loadUserInfo();
    </script>
</body>
</html>
