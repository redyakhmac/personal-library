<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد | کتابخانه من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar-island">
            <div class="sidebar-header">
                <div class="user-avatar">
                    <img src="assets/images/default-avatar.png" alt="avatar" id="user-avatar">
                </div>
                <div class="user-info">
                    <h4 id="user-name">کاربر</h4>
                    <span id="user-phone"></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>داشبورد</span>
                </a>
                <a href="/books" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>کتاب‌ها</span>
                </a>
                <a href="/users" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>کاربران</span>
                </a>
                <a href="/statistics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>آمار</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>تنظیمات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/api/logout" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>خروج</span>
                </a>
            </div>
        </aside>

        <main class="main-island">
            <header class="header-island">
                <div class="header-left">
                    <div class="notification-bell">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="app-info">
                        <i class="fas fa-info-circle"></i>
                        <span>کتابخانه شخصی v1.0</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="stats-row">
                    <div class="stat-card-mini">
                        <i class="fas fa-book"></i>
                        <div>
                            <h3 id="total-books">0</h3>
                            <p>کل کتاب‌ها</p>
                        </div>
                    </div>
                    <div class="stat-card-mini">
                        <i class="fas fa-check-circle"></i>
                        <div>
                            <h3 id="completed-books">0</h3>
                            <p>خوانده شده</p>
                        </div>
                    </div>
                    <div class="stat-card-mini">
                        <i class="fas fa-hourglass-half"></i>
                        <div>
                            <h3 id="reading-books">0</h3>
                            <p>در حال خواندن</p>
                        </div>
                    </div>
                </div>
                <div class="charts-row">
                    <div class="chart-card">
                        <canvas id="status-chart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/user-stats');
                const data = await res.json();
                if (data.success !== false) {
                    document.getElementById('total-books').innerText = data.total || 0;
                    document.getElementById('completed-books').innerText = data.completed || 0;
                    document.getElementById('reading-books').innerText = data.reading || 0;
                    
                    const ctx = document.getElementById('status-chart');
                    if (ctx) {
                        new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: ['خوانده شده', 'در حال خواندن', 'نخوانده'],
                                datasets: [{
                                    data: [data.completed || 0, data.reading || 0, data.to_read || 0],
                                    backgroundColor: ['#28a745', '#ffc107', '#6c757d']
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: {
                                    legend: {
                                        position: 'bottom'
                                    }
                                }
                            }
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        loadStats();
        loadUserInfo();
    </script>
</body>
</html>
